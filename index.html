<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te amo Joanna❤️</title>

<link rel="stylesheet" href="estilos.css">
</head>
<body>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- PANTALLA 1 -->
<div class="pantalla inicio" id="pantalla1">
    <h1>¿Estás lista para este viaje? ❤️</h1>
    <button onclick="entrar()">Vamos 💕</button>
</div>

<!-- PANTALLA 2 -->
<div class="pantalla" id="pantalla2">
    <h1>Para ti ❤️</h1>
    <p>Tengo algo que decirte...</p>

    <button onclick="irFinal()">Haz clic aquí 💌</button>
</div>

<!-- PANTALLA 3 -->
<div class="pantalla" id="pantalla3">

    </h1>Joanna 💕</h1>

    <div class="carta">
        <p>Me encantaría vivir todo esto contigo...</p>
    </div>

    <!-- CARRUSEL -->
    <div class="carrusel">

        <div class="slide activo">
            <img src="img1.jpg">
            <div class="texto">🌅 Ver el atardecer contigo</div>
        </div>

        <div class="slide">
            <img src="img2.jpg">
            <div class="texto">🎬 Ir al cine abrazados</div>
        </div>

        <div class="slide">
            <img src="img3.jpg">
            <div class="texto">🍕 Comer en el bosque juntos</div>
        </div>

        <div class="slide">
            <img src="img4.jpg">
            <div class="texto">✈Viajar juntos</div>
        </div>

        <div class="slide">
            <img src="img5.jpg">
            <div class="texto">💞 Cocinar juntos </div>
        </div>
        <div class="slide">
            <img src="img6.jpg">
            <div class="texto">💞 Dormir juntos </div>
        </div>

        <div class="controles">
            <button onclick="anterior()">⟵</button>
            <button onclick="siguiente()">⟶</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
